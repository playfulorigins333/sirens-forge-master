name: Task 22 Public AutoPost Scope Lock

on:
  pull_request:
    paths:
      - 'app/autopost/page.tsx'
      - 'backend/creator-publishing-queue/tests/task22PublicAutopostScopeLockSourceContract.test.ts'
      - '.github/workflows/task22-public-autopost-scope-lock.yml'
  workflow_dispatch:

jobs:
  source-contract:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
      CRON_SECRET: dummy-cron-secret
      OPENAI_API_KEY: dummy-openai-key
      STRIPE_SECRET_KEY: dummy-stripe-key
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Task 22 Public AutoPost Scope Lock changed-file guard
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          mapfile -t changed < <(git diff --name-only "$base"...HEAD)
          printf '%s\n' "${changed[@]}" | tee changed-files.txt

          required=(
            "app/autopost/page.tsx"
            "backend/creator-publishing-queue/tests/task22PublicAutopostScopeLockSourceContract.test.ts"
            ".github/workflows/task22-public-autopost-scope-lock.yml"
          )

          if ((${#changed[@]} == 0)); then
            echo "Task 22 Public AutoPost Scope Lock changed-file set must not be empty" >&2
            exit 1
          fi

          if ((${#changed[@]} != ${#required[@]})); then
            echo "Task 22 Public AutoPost Scope Lock must change exactly three authorized files" >&2
            exit 1
          fi

          unauthorized=()
          missing=()
          for path in "${changed[@]}"; do
            allowed=false
            for required_path in "${required[@]}"; do
              if [[ "$path" == "$required_path" ]]; then
                allowed=true
                break
              fi
            done
            if [[ "$allowed" != true ]]; then unauthorized+=("$path"); fi
          done

          for required_path in "${required[@]}"; do
            found=false
            for path in "${changed[@]}"; do
              if [[ "$path" == "$required_path" ]]; then
                found=true
                break
              fi
            done
            if [[ "$found" != true ]]; then missing+=("$required_path"); fi
          done

          if ((${#unauthorized[@]} > 0)); then
            printf 'Unauthorized Task 22 Public AutoPost Scope Lock path changed: %s\n' "${unauthorized[@]}" >&2
            exit 1
          fi
          if ((${#missing[@]} > 0)); then
            printf 'Required Task 22 Public AutoPost Scope Lock path missing: %s\n' "${missing[@]}" >&2
            exit 1
          fi
      - run: npx tsx backend/creator-publishing-queue/tests/task22PublicAutopostScopeLockSourceContract.test.ts
      - run: npx tsx backend/creator-publishing-queue/tests/task15SchedulerSourceContract.test.ts
      - run: npx tsx backend/creator-publishing-queue/tests/autopostOrchestration.test.ts
      - run: npx tsx backend/creator-publishing-queue/tests/task21PlanSchedulingSourceContract.test.ts
      - run: npx tsx backend/creator-publishing-queue/tests/task21PlanSchedulingUi.test.ts
      - run: npm run test:creator-publishing-queue
      - run: npx tsc --noEmit
      - run: npm run build
      - run: git diff --check
      - name: Upload Task 22 Public AutoPost Scope Lock diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: task22-public-autopost-scope-lock-diagnostics
          if-no-files-found: ignore
          path: |
            changed-files.txt
            .next/trace

name: Task 21 Creator Publishing Reliability

on:
  pull_request:
    paths:
      - 'app/api/creator-publishing-queue/scheduler/run/route.ts'
      - 'lib/creator-publishing-queue/scheduler-runner/serviceCore.ts'
      - 'backend/creator-publishing-queue/tests/task21SchedulerRunnerServices.test.ts'
      - 'backend/creator-publishing-queue/tests/task21SchedulerRunnerSourceContract.test.ts'
      - 'backend/creator-publishing-queue/tests/task21SchedulerRunnerTelemetryContract.test.ts'
      - 'backend/creator-publishing-queue/tests/task21SchedulerRetryExhaustionPostgresIntegration.sql'
      - 'backend/creator-publishing-queue/tests/runTask21SchedulerRetryExhaustionPostgresIntegration.mjs'
      - 'supabase/migrations/20260721001900_creator_publishing_scheduler_retry_exhaustion.sql'
      - 'backend/creator-publishing-queue/tests/task21SchedulerRetryRecoveryPostgresIntegration.sql'
      - 'backend/creator-publishing-queue/tests/runTask21SchedulerRetryRecoveryPostgresIntegration.mjs'
      - 'supabase/migrations/20260721002000_creator_publishing_scheduler_retry_exhaustion_recovery.sql'
      - 'lib/creator-publishing-queue/scheduling/**'
      - 'app/api/creator-publishing-queue/scheduling/**'
      - 'app/autopost/Task15PlanScheduling.tsx'
      - 'app/autopost/page.tsx'
      - 'app/autopost/Task14AutopostOrchestration.tsx'
      - 'backend/creator-publishing-queue/tests/task21PlanSchedulingServices.test.ts'
      - 'backend/creator-publishing-queue/tests/task21PlanSchedulingSourceContract.test.ts'
      - 'backend/creator-publishing-queue/tests/task21PlanSchedulingUi.test.ts'
      - 'docs/creator-publishing/task21-onlyfans-reliability-operations.md'
      - '.github/workflows/task21-onlyfans-reliability.yml'
  workflow_dispatch:

jobs:
  reliability:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
      TASK21_SCHEDULER_RETRY_EXHAUSTION_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/task21_scheduler_retry_exhaustion_ci
      TASK21_SCHEDULER_RETRY_RECOVERY_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/task21_scheduler_retry_recovery_ci
      TASK15_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/task15_ci
      TASK17A_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/task17a_ci
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
      CRON_SECRET: dummy-cron-secret
      OPENAI_API_KEY: dummy-openai-key
      STRIPE_SECRET_KEY: dummy-stripe-key
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Changed-file scope guard
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha || github.sha }}"
          mapfile -t changed < <(git diff --name-only "$base"...HEAD)
          printf '%s\n' "${changed[@]}" | tee changed-files.txt

          required=(
            "supabase/migrations/20260721002000_creator_publishing_scheduler_retry_exhaustion_recovery.sql"
            "backend/creator-publishing-queue/tests/task21SchedulerRetryRecoveryPostgresIntegration.sql"
            "backend/creator-publishing-queue/tests/runTask21SchedulerRetryRecoveryPostgresIntegration.mjs"
            "docs/creator-publishing/task21-onlyfans-reliability-operations.md"
            ".github/workflows/task21-onlyfans-reliability.yml"
          )

          if ((${#changed[@]} == 0)); then
            echo "Task 21 Gate 21C-5 changed-file set is empty" >&2
            exit 1
          fi

          unauthorized=()
          missing=()
          migration_count=0
          for path in "${changed[@]}"; do
            allowed=false
            for required_path in "${required[@]}"; do
              if [[ "$path" == "$required_path" ]]; then
                allowed=true
                break
              fi
            done
            if [[ "$allowed" != true ]]; then unauthorized+=("$path"); fi
            if [[ "$path" == supabase/migrations/* ]]; then
              ((migration_count += 1))
              if [[ "$path" != "supabase/migrations/20260721002000_creator_publishing_scheduler_retry_exhaustion_recovery.sql" ]]; then
                unauthorized+=("$path")
              fi
            fi
          done

          for required_path in "${required[@]}"; do
            found=false
            for path in "${changed[@]}"; do
              if [[ "$path" == "$required_path" ]]; then
                found=true
                break
              fi
            done
            if [[ "$found" != true ]]; then missing+=("$required_path"); fi
          done

          if ((${#unauthorized[@]} > 0)); then
            printf 'Unauthorized Task 21 Gate 21C-5 path changed: %s\n' "${unauthorized[@]}" >&2
            exit 1
          fi
          if ((${#missing[@]} > 0)); then
            printf 'Required Task 21 Gate 21C-5 path missing: %s\n' "${missing[@]}" >&2
            exit 1
          fi
          if ((migration_count != 1)); then
            echo "Task 21 Gate 21C-5 requires exactly one migration, the exact 02000 path" >&2
            exit 1
          fi
          if ((${#changed[@]} != ${#required[@]})); then
            echo "Task 21 Gate 21C-5 must change exactly five authorized files" >&2
            exit 1
          fi
      - name: Gate 21C-5 disposable PostgreSQL integration and concurrency
        run: node backend/creator-publishing-queue/tests/runTask21SchedulerRetryRecoveryPostgresIntegration.mjs
      - name: Gate 21C-4 disposable PostgreSQL regression
        run: node backend/creator-publishing-queue/tests/runTask21SchedulerRetryExhaustionPostgresIntegration.mjs
      - run: npx tsx backend/creator-publishing-queue/tests/task21SchedulerRunnerServices.test.ts
      - run: npx tsx backend/creator-publishing-queue/tests/task21SchedulerRunnerSourceContract.test.ts
      - run: npx tsx backend/creator-publishing-queue/tests/task21SchedulerRunnerTelemetryContract.test.ts
      - run: npx tsx backend/creator-publishing-queue/tests/task21PlanSchedulingServices.test.ts
      - run: npx tsx backend/creator-publishing-queue/tests/task21PlanSchedulingSourceContract.test.ts
      - run: npx tsx backend/creator-publishing-queue/tests/task21PlanSchedulingUi.test.ts
      - run: npx tsx backend/creator-publishing-queue/tests/autopostOrchestration.test.ts
      - run: npx tsx backend/creator-publishing-queue/tests/task15SchedulerSourceContract.test.ts
      - name: Create Task 15 and Task 17A disposable databases
        shell: bash
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          drop database if exists task15_ci with (force);
          drop database if exists task17a_ci with (force);
          create database task15_ci;
          create database task17a_ci;
          SQL
      - run: npm run test:creator-publishing-task15-postgres
      - run: npx tsx backend/creator-publishing-queue/tests/task17aOperatorQueueSourceContract.test.ts
      - run: npm run test:creator-publishing-task17a-upgrade
      - run: npm run test:creator-publishing-task17a-postgres
      - run: npm run test:creator-publishing-queue
      - run: npx tsc --noEmit
      - run: npm run build
      - run: git diff --check
      - name: Upload Task 21 Gate 21C-5 diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: task21-creator-publishing-reliability-diagnostics
          if-no-files-found: ignore
          path: |
            changed-files.txt
            task21-scheduler-retry-recovery-postgres-diagnostics.log
            task21-scheduler-retry-exhaustion-postgres-diagnostics.log
            task15-postgres-diagnostics.log
            task17a-postgres-diagnostics*.log
            .next/trace

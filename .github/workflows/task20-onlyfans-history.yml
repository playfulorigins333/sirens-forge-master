name: Task 20 OnlyFans History Timeline

on:
  pull_request:
    paths:
      - 'supabase/migrations/20260718001700_creator_publishing_onlyfans_history_timeline.sql'
      - 'lib/creator-publishing-queue/onlyfans-history/**'
      - 'lib/creator-publishing-queue/operator-completion/serviceCore.ts'
      - 'app/creator/publishing-queue/OnlyFansHistoryTimeline.tsx'
      - 'app/creator/publishing-queue/[contentPackageId]/page.tsx'
      - 'app/creator/publishing-queue/operator/page.tsx'
      - 'app/creator/publishing-queue/operator/[platformJobId]/page.tsx'
      - 'app/creator/publishing-queue/operator/history/**'
      - 'backend/creator-publishing-queue/tests/task20OnlyFansHistory*'
      - 'backend/creator-publishing-queue/tests/runTask20OnlyFansHistory*'
      - 'backend/creator-publishing-queue/tests/task17b2OperatorQueueUi.test.ts'
      - 'backend/creator-publishing-queue/tests/task17b2OperatorQueueSourceContract.test.ts'
      - 'backend/creator-publishing-queue/tests/task18ManualCompletionServices.test.ts'
      - 'backend/creator-publishing-queue/tests/task18ManualCompletionSourceContract.test.ts'
      - 'docs/creator-publishing/task20-onlyfans-history.md'
      - '.github/workflows/task20-onlyfans-history.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres
      TASK20_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/task20_ci
      TASK18_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/task18_ci
      TASK17A_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/task17a_ci
      TASK15_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/task15_ci
      TASK18_ENFORCE_INITIAL_SCOPE: 'false'
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
      SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
      STRIPE_SECRET_KEY: sk_test_dummy
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
      RESEND_API_KEY: re_dummy
      R2_ACCOUNT_ID: dummy
      R2_ACCESS_KEY_ID: dummy
      R2_SECRET_ACCESS_KEY: dummy
      R2_BUCKET: dummy
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Create affected Task 18 isolated databases
        shell: bash
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          drop database if exists task18_ci with (force);
          drop database if exists task17a_ci with (force);
          drop database if exists task15_ci with (force);
          create database task18_ci;
          create database task17a_ci;
          create database task15_ci;
          SQL
      - name: Task 20 normalization and timezone tests
        run: npx tsx backend/creator-publishing-queue/tests/task20OnlyFansHistory.test.ts
      - name: Task 20 exact resolution and evidence lifecycle tests
        run: npx tsx backend/creator-publishing-queue/tests/task20OnlyFansHistoryResolution.test.ts
      - name: Task 20 completion and creator-attempt truthfulness tests
        run: npx tsx backend/creator-publishing-queue/tests/task20OnlyFansHistoryTruthfulness.test.ts
      - name: Task 20 persisted catalog, schedule, controls, and immutable-reference tests
        run: npx tsx backend/creator-publishing-queue/tests/task20OnlyFansHistoryExit.test.ts
      - name: Task 20 source-contract tests
        run: npx tsx backend/creator-publishing-queue/tests/task20OnlyFansHistorySourceContract.test.ts
      - name: Task 20 isolated PostgreSQL migration and integration
        run: node backend/creator-publishing-queue/tests/runTask20OnlyFansHistoryPostgresIntegration.mjs
      - name: Task 20 true audited-wrapper concurrency
        run: node backend/creator-publishing-queue/tests/runTask20OnlyFansHistoryConcurrency.mjs
      - name: Affected Task 17B-2 operator UI
        run: npx tsx backend/creator-publishing-queue/tests/task17b2OperatorQueueUi.test.ts
      - name: Affected Task 17B-2 source contract
        run: npx tsx backend/creator-publishing-queue/tests/task17b2OperatorQueueSourceContract.test.ts
      - name: Affected Task 18 PostgreSQL integration
        run: node backend/creator-publishing-queue/tests/runTask18ManualCompletionPostgresIntegration.mjs
      - name: Affected Task 18 true concurrency
        run: node backend/creator-publishing-queue/tests/runTask18ManualCompletionConcurrency.mjs
      - name: Affected Task 18 service behavior
        run: npx tsx backend/creator-publishing-queue/tests/task18ManualCompletionServices.test.ts
      - name: Affected Task 18 source contract
        run: npx tsx backend/creator-publishing-queue/tests/task18ManualCompletionSourceContract.test.ts
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Production build
        run: npm run build
      - name: Whitespace and patch validation
        run: git diff --check
      - name: Upload Task 20 diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: task20-diagnostics
          if-no-files-found: ignore
          path: |
            task20-postgres-diagnostics.log
            task20-concurrency-diagnostics.log
            task18-postgres-diagnostics.log
            task18-concurrency-diagnostics.log
